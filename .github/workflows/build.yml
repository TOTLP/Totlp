name: Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore signing key
      env:
        SIGNING_KEY: ${{ secrets.VS_SIGNING_KEY }}
      run: |
        if [ ! -z "$SIGNING_KEY" ]; then
          echo $SIGNING_KEY | base64 --decode > TOTLP.Net/Totlp.snk
        fi
        
    - name: Restore dependencies
      run: dotnet restore TOTLP.Net/TOTLP.Net.csproj
      
    - name: Build project (Release)
      run: dotnet build TOTLP.Net/TOTLP.Net.csproj --no-restore --configuration Release
